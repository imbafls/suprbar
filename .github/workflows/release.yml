name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build brand assets
        run: python scripts/build_brand.py

      - name: Run PyInstaller
        run: pyinstaller --clean --noconfirm suprbar.spec

      - name: Build installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & $iscc installer.iss

      - name: Zip portable bundle
        run: |
          Compress-Archive -Path dist/suprbar/* -DestinationPath dist/suprbar-portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: suprbar-windows
          path: |
            dist/suprbar-setup-*.exe
            dist/suprbar-portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/suprbar-setup-*.exe
            dist/suprbar-portable.zip
          generate_release_notes: true
          draft: false
          prerelease: false
